<!DOCTYPE html>
<html lang="en">

<head>
    <title>구글 웹 폰트 이용하기</title>
    <!-- 폰트를 바꿀려면 -->
    <!-- 조건1 : 프론트PC에 설치되어 있는 폰트 사용 -->
    <!-- 조건2 : 폰트 ttf,otf 파일 함께 배포 -->
    <!-- 조건3 : 인터넷 상에 있는 폰트를 사용 -->
    <!-- Web Font : 인터넷상에 폰트를 사용하는 것 -->
    <!-- 장점 : 폰트를 배포하거나 설치할 필요가 없음. -->
    <!--        다운로드를 한번만 하고 계속 사용함.캐쉬. -->
    <!-- 구글 웹 폰트 사이트 이용 -->
    <!-- 폰트 바꾸기 : font-family -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Pattaya&display=swap');

        h1 {
            font-family: 'Nanum Gothic', sans-serif;
        }
        /* 폰트 바꾸기 연습 h2에 재밌는 영문폰트로 적용하시오. */
        h2{
            font-family: 'Pattaya', sans-serif;
        }

    </style>

</head>

<body>
    <h1>대한민국 홍길동 12345</h1>
    <h2>Nice to meet you</h2>
</body>

</html>
