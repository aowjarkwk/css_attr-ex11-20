<!DOCTYPE html>
<html lang="en">

<head>
    <title>연습문제2 - 이미지위에 글자 쓰기</title>
    <style>
        .p:first-child{
            position: absolute;
            top:150px;
            left:100px;
        }
        .p:nth-child(2){
            position: absolute;
            color:skyblue;
            background-color: white;
            top:300px;
            left:270px;
        }
        
    </style>
</head>

<body>
    <img src="work_office.jpg" alt="업무 이미지" class="p">
    <h1 class="p">효율적인 회의시간</h1>
</body>

</html>
