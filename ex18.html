<!DOCTYPE html>
<html lang="en">

<head>
    <title>텍스트/박스 그림자 속성</title>
    <style>
        h1{
            /*      거리:오른쪽 아랫쪽 흐림도 색상*/
            text-shadow: 10px 10px 3px gray;
        }
        h2{
            text-shadow: 3px 3px 10px purple;
        }
        div{
            border: 3px solid black;
            box-shadow: 10px 10px 10px rgba(255,0,0);
        }
        /* css3generator.com 이용*/
        
    </style>
</head>

<body>
    <h1>Lorem ipsum, dolor sit amet</h1>
    <h2>Lorem ipsum, dolor sit amet</h2>
    <div>
        <h1>Lorem ipsum, dolor sit amet</h1>
    </div>
</body>

</html>
