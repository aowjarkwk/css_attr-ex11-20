<!DOCTYPE html>
<html lang="en">
<head>
    <title>position 속성</title>
    <!-- 상대좌표 : 기본속성, 현재위치로부터 떨어진 위치(X,Y) OFFSET -->
    <!-- 절대좌표 : 원점(0,0 스크린좌표 왼쪽위부터)-->
    <!--         : 쓰는 이유 - 중첩시킬때, 부모(컨테이너)로부터 특정좌표만큼 이동할때 -->
<style>
    .box{
        width:100px;
        height:100px;
        border: 1px solid red;

        position:absolute;
    }
    .red{
        background-color: red;
        left:10px; top: 10px;
    }
    .green{
        background-color: green;
        left:50px; top:50px;
    }
    .blue{
        background-color: blue;
        left:90px; top:90px;
    }
</style>
</head>
<body>
    <h1>Header tag h1</h1>
    <div class="box red"></div>
    <div class="box green"></div>
    <div class="box blue"></div>
    <h1>Header tag h1</h1>
</body>
</html>
