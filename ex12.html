<!DOCTYPE html>
<html lang="en">

<head>
    <title>폰트(글꼴) 선택 - font-family</title>
    <!-- 영문 폰트 -->
    <!-- 한글 폰트 -->
    <style>
        h1 {
            /* 왼쪽부터 찾아서 있으면 적용! 없으면 다음 폰트 적용 없으면 기본 폰트 적용 */
            font-family: Arial, Helvetica, sans-serif;
        }

        /* 
    serif : 폰트 끝이 뾰족하다. 명조체같이 
    sans-serif : 폰트 끝이 매끈(각), 굴림체같이 
    굴림 폰트 : 고정너비(글자마다 너비가 같다) - 정리정돈됨. 
    굴림체 폰트 : 가변너비(글자마다 너비가 다르다) - 예쁘다.
      */

        p {
            /* 폰트이름 중간에 공백이 있으면 따옴표로 묶어줘야함 
                        + 대소문자 가림*/
            font-family: '없는 폰트', 'Times new roman', monospace;
        }

        h2 {
            font-family: "굴림", "맑은고딕";
        }

        /* serif(명조 계열) : Times New Roman, Bodoni, Garamond, Minion Web, …
sans-serif(고딕 계열) : MS Trebuchet, MS Arial, MS Verdana, Univers, …
cursive(필기체) : Caflisch Script, Adobe Poetica, Sanvito, Ex Ponto
fantasy(장식체) : Alpha Geometrique, Critter, Cottonwood, FB Reactor, Studz
monospace(고정폭) : Courier, MS Courier New, Prestige, Everson Mono …
가변폭 글꼴 : 굴림(Gulim), 돋움(Dotum), 바탕(Batang), 궁서(Gungsuh)
고정폭 글꼴 : 굴림체(GulimChe), 돋움체(DotumChe), 바탕체(BatangChe), 궁서체(GungsuhChe) */
    </style>
</head>

<body>
    <h1>Header h1 tag.</h1>
    <p>Paragraph tag</p>
    <h2>동해물과 백두산이 1234</h2>
</body>

</html>
